version: '3.8'

x-fastapi-base: &fastapi-base
  build:
    context: .
    dockerfile: deploy/dockerfile.web
  ports:
    - "8000:8000"
  env_file:
    - .env.fastapi
    - .env.mysql
    - .env.ldap
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - UV_PROJECT_ENVIRONMENT=/app/.venv
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    mysql-asterisk:
      condition: service_healthy
  networks:
    - ceph-asterisk_default

services:
  mysql-asterisk:
    container_name: ${MYSQL_CONTAINER_NAME}
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env.mysql
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./deploy/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ceph-asterisk_default

  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    env_file:
      - .env.ldap
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/ldap/slapd.d
      - ./deploy/ldif_files:/container/service/slapd/assets/config/bootstrap/ldif/custom
    command: --copy-service --loglevel debug
    networks:
      - ceph-asterisk_default

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    env_file:
      - .env.ldap
    ports:
      - "8080:80"
    depends_on:
      - openldap
    networks:
      - ceph-asterisk_default

  fastapi-dev:
    <<: *fastapi-base
    profiles: [dev]
    container_name: fastapi-dev
    volumes:
      - .:/app
      - /app/.venv
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "uv sync &&
             sh deploy/entrypoint.sh uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  fastapi-prod:
    <<: *fastapi-base
    profiles: [prod]
    container_name: fastapi-prod
    volumes:
      - ./asterisk_configs:/app/asterisk_configs
      - ./docker-compose:/app/docker-compose
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh deploy/entrypoint.sh uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - network.host=0.0.0.0
      - http.host=0.0.0.0
      - transport.host=127.0.0.1
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ceph-asterisk_default

volumes:
  es_data:
    name: ceph-asterisk_es_data

networks:
  ceph-asterisk_default:
    external: true
    driver: bridge
