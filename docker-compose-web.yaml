services:
  fastapi-app:
    build:
      context: .
      dockerfile: dockerfile.web
    container_name: fastapi-dev
    ports:
      - "8000:8000"
    volumes:
      # Монтируем всю директорию проекта для hot-reload
      - ./:/app
      # Исключаем виртуальное окружение из монтирования (опционально)
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - UV_PROJECT_ENVIRONMENT=/app/.venv  # Указываем где виртуальное окружение
    command: >
      sh -c "uv sync && 
             uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"