# Устарело: предпочтительно docker compose --profile dev (docker-compose.yaml).
# Этот файл — только FastAPI без MySQL/LDAP, для локальной отладки API.

services:
  fastapi-dev:
    build:
      context: .
      dockerfile: dockerfile.web
    container_name: fastapi-dev
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /app/.venv
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEV_MODE=${DEV_MODE:-true}
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "uv sync &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
